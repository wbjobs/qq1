<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>声波干涉可视化</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>声波干涉可视化</h1>
      <p class="subtitle">双点声源干涉现象实时模拟</p>
    </header>

    <div class="main-content">
      <div class="canvas-container">
        <canvas id="waveCanvas" width="800" height="600"></canvas>
        <div class="canvas-overlay">
          <span id="splDisplay" class="spl-display">SPL: -- dB</span>
          <span id="interferenceDisplay" class="interference-display">干涉类型: --</span>
        </div>
      </div>

      <div class="sidebar">
        <div class="control-panel">
          <h2>参数控制</h2>

          <div class="control-group">
            <label for="frequency">频率: <span id="freqValue">440</span> Hz</label>
            <input type="range" id="frequency" min="20" max="2000" value="440" step="1">
          </div>

          <div class="control-group">
            <label for="sourceDistance">声源间距: <span id="distValue">200</span> px</label>
            <input type="range" id="sourceDistance" min="20" max="500" value="200" step="1">
          </div>

          <div class="control-group">
            <label>
              <input type="checkbox" id="showWaves" checked>
              显示波纹
            </label>
          </div>

          <div class="control-group">
            <label>
              <input type="checkbox" id="showInterference" checked>
              显示干涉条纹
            </label>
          </div>

          <div class="control-group">
            <label>
              <input type="checkbox" id="clickMode" checked>
              点击设置声源2
            </label>
          </div>

          <div class="control-group">
            <label>
              <input type="checkbox" id="standingWaveMode">
              驻波模式
            </label>
          </div>

          <div class="control-group">
            <label>
              <input type="checkbox" id="showNodeLines">
              显示驻波节线
            </label>
          </div>

          <button id="exportBtn" class="btn export-btn">导出PNG图片</button>
        </div>

        <div class="info-panel">
          <h2>声压信息</h2>
          <div class="info-row">
            <span class="info-label">声源1位置:</span>
            <span id="source1Pos" class="info-value">--</span>
          </div>
          <div class="info-row">
            <span class="info-label">声源2位置:</span>
            <span id="source2Pos" class="info-value">--</span>
          </div>
          <div class="info-row">
            <span class="info-label">点击点位置:</span>
            <span id="clickPos" class="info-value">--</span>
          </div>
          <div class="info-row">
            <span class="info-label">波长:</span>
            <span id="wavelength" class="info-value">-- m</span>
          </div>
          <div class="info-row">
            <span class="info-label">连接状态:</span>
            <span id="wsStatus" class="info-value status-disconnected">未连接</span>
          </div>
        </div>

        <div class="spectrum-panel">
          <h2>频谱图 & 驻波比</h2>
          <canvas id="spectrumCanvas" width="280" height="150"></canvas>
          <div class="swr-info">
            <div class="swr-row">
              <span class="swr-label">SWR:</span>
              <span id="swrValue" class="swr-value">--</span>
            </div>
            <div class="swr-row">
              <span class="swr-label">最大SPL:</span>
              <span id="swrMaxSpl" class="swr-sub">-- dB</span>
            </div>
            <div class="swr-row">
              <span class="swr-label">最小SPL:</span>
              <span id="swrMinSpl" class="swr-sub">-- dB</span>
            </div>
          </div>
        </div>

        <div class="history-panel">
          <h2>历史记录</h2>
          <div id="historyList" class="history-list"></div>
          <button id="refreshHistory" class="btn">刷新记录</button>
        </div>
      </div>
    </div>

    <div class="legend">
      <div class="legend-item">
        <span class="legend-color constructive"></span>
        <span>加强区域（亮）</span>
      </div>
      <div class="legend-item">
        <span class="legend-color destructive"></span>
        <span>减弱区域（暗）</span>
      </div>
      <div class="legend-item">
        <span class="legend-line node"></span>
        <span>驻波节线</span>
      </div>
      <div class="legend-item">
        <span class="legend-dot source1"></span>
        <span>声源 1</span>
      </div>
      <div class="legend-item">
        <span class="legend-dot source2"></span>
        <span>声源 2</span>
      </div>
    </div>
  </div>

  <script src="main.js"></script>
</body>
</html>
